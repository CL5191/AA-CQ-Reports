name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Generate sample report artifacts
        run: npm run generate:sample-reports

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aa-cq-reports-${{ github.run_number }}
          path: reports/
