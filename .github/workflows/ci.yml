name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Generate sample report artifacts
        run: |
          mkdir -p reports
          npm start -- data/sample-cq.csv --source cq --format html --out reports/cq-summary.html
          npm start -- data/sample-cq.csv --source cq --format json --out reports/cq-summary.json
          npm start -- data/sample-aa.csv --source aa --format html --out reports/aa-summary.html
          npm start -- data/sample-aa.csv --source aa --format csv --out reports/aa-summary.csv

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aa-cq-reports-${{ github.run_number }}
          path: reports/
